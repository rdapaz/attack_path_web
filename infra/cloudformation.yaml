AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Attack Path Visualizer — single-EC2 free-tier stack.
  Creates: VPC, public subnet, IGW, Security Group, EIP, and one
  t2.micro EC2 instance that bootstraps FastAPI + React + nginx from
  a public GitHub repo via UserData.

# ---------------------------------------------------------------------------
# Parameters — set these in the CloudFormation console when creating the stack
# ---------------------------------------------------------------------------
Parameters:
  RepoUrl:
    Type: String
    Description: "Public HTTPS URL of the GitHub repo containing this project (e.g. https://github.com/<user>/attack_path_web.git)"
    AllowedPattern: "^https://.*\\.git$"
    ConstraintDescription: "Must be an HTTPS git URL ending in .git"

  RepoBranch:
    Type: String
    Default: main
    Description: "Branch to clone (default: main)"

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "Existing EC2 key pair (create one in EC2 > Key Pairs if none exists) — used for SSH access"

  YourIpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "Your public IP in CIDR form (e.g. 203.0.113.5/32) for SSH access. Leave 0.0.0.0/0 only if you know what you are doing."
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro      # AWS Free Tier (12 months, most regions)
      - t3.micro      # AWS Free Tier (12 months, selected regions incl. ap-southeast-4)
      - t4g.micro     # AWS Free Tier (ARM) — NOTE: requires an ARM AMI, userdata unchanged
    Description: "Free-tier eligible instance type. t2.micro is the broadest; t3.micro is included in ap-southeast-4."

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: "SSM parameter resolving to the latest Amazon Linux 2023 AMI. Leave the default."

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.20.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: attack-path-vpc }

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.20.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - { Key: Name, Value: attack-path-public }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: attack-path-igw }

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: attack-path-rt }

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- Security ----------------------------------------------------------
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "HTTP from anywhere, SSH from your IP"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: "HTTP"
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref YourIpCidr
          Description: "SSH from your IP"
      Tags:
        - { Key: Name, Value: attack-path-sg }

  # --- Compute ----------------------------------------------------------
  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 20     # 20 GB — under 30 GB free tier
            DeleteOnTermination: true
            Encrypted: true
      Tags:
        - { Key: Name, Value: attack-path-web }
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            # --- Bootstrap log sent to /var/log/user-data.log ---
            exec > >(tee /var/log/user-data.log|logger -t user-data) 2>&1

            set -euxo pipefail
            dnf update -y
            dnf install -y git nginx python3.12 python3.12-pip
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            dnf install -y nodejs

            install -d -o ec2-user -g ec2-user /opt/attack-path
            sudo -u ec2-user git clone --branch "${RepoBranch}" --depth 1 "${RepoUrl}" /opt/attack-path/src
            ln -sfn /opt/attack-path/src/backend  /opt/attack-path/backend
            ln -sfn /opt/attack-path/src/frontend /opt/attack-path/frontend
            ln -sfn /opt/attack-path/src/deploy   /opt/attack-path/deploy

            cd /opt/attack-path/backend
            sudo -u ec2-user python3.12 -m venv .venv
            sudo -u ec2-user .venv/bin/pip install --upgrade pip
            sudo -u ec2-user .venv/bin/pip install -e .

            cd /opt/attack-path/frontend
            sudo -u ec2-user npm ci
            sudo -u ec2-user npm run build
            install -d -o nginx -g nginx /var/www/attack-path
            cp -r dist/. /var/www/attack-path/
            chown -R nginx:nginx /var/www/attack-path

            install -d -o ec2-user -g ec2-user -m 0750 /var/lib/attack-path
            install -d -o ec2-user -g ec2-user -m 0750 /var/lib/attack-path/uploads

            cp /opt/attack-path/deploy/systemd/attack-path.service /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable --now attack-path

            # nginx — strip default server block from nginx.conf, drop ours in conf.d/
            sed -i '/^\s*server\s*{/,/^\s*}/d' /etc/nginx/nginx.conf
            cp /opt/attack-path/deploy/nginx.conf /etc/nginx/conf.d/attack-path.conf
            nginx -t
            systemctl enable --now nginx

            echo "=== attack-path bootstrap complete ==="

  # --- Static public IP -------------------------------------------------
  ElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - { Key: Name, Value: attack-path-eip }

  EipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIp.AllocationId
      InstanceId: !Ref WebInstance

# ---------------------------------------------------------------------------
# Outputs — shown in the CloudFormation console when the stack completes
# ---------------------------------------------------------------------------
Outputs:
  WebUrl:
    Description: "Open this in your browser once the instance finishes bootstrapping (~5 minutes after CREATE_COMPLETE)"
    Value: !Sub "http://${ElasticIp}/"

  ElasticIpAddress:
    Description: "Public IP of the instance"
    Value: !Ref ElasticIp

  SshCommand:
    Description: "SSH into the box (replace KEY.pem with your key file)"
    Value: !Sub "ssh -i KEY.pem ec2-user@${ElasticIp}"

  BootstrapLog:
    Description: "Where the UserData script logs its progress on the instance"
    Value: "/var/log/user-data.log"
